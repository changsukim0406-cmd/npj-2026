<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPJ 2026 Reconstruction Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #f3f6fb;
      color: #1e293b;
      font-family: Inter, Pretendard, sans-serif;
    }

    .card {
      background: white;
      border: 1px solid #e2e8f0;
      box-shadow:
        0 4px 12px rgba(15, 23, 42, 0.05),
        0 1px 3px rgba(15, 23, 42, 0.04);
    }

    .status-waiting {
      background: #f1f5f9;
      color: #64748b;
      border: 1px solid #cbd5e1;
    }

    .status-progress {
      background: #dbeafe;
      color: #2563eb;
      border: 1px solid #93c5fd;
    }

    .status-done {
      background: #dcfce7;
      color: #16a34a;
      border: 1px solid #86efac;
    }

    .next-sfm {
      background: #fee2e2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .next-hgs {
      background: #fef3c7;
      color: #d97706;
      border: 1px solid #fde68a;
    }

    .next-aa {
      background: #dbeafe;
      color: #2563eb;
      border: 1px solid #93c5fd;
    }

    .next-done {
      background: #dcfce7;
      color: #16a34a;
      border: 1px solid #86efac;
    }

    select, input {
      background: white;
      border: 1px solid #cbd5e1;
      color: #0f172a;
    }

    select:focus, input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }
  </style>
</head>

<body class="min-h-screen p-6">

  <div class="max-w-7xl mx-auto">

    <!-- HEADER -->
    <div class="mb-8 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">

      <div>
        <h1 class="text-4xl font-bold tracking-tight text-slate-800">
          NPJ 2026 Reconstruction Dashboard
        </h1>

        <p class="text-slate-500 mt-2">
          COLMAP → 3D-HGS → AA-2DGS 진행 현황 관리
        </p>
      </div>

      <div class="flex gap-3">

        <button
          id="resetBtn"
          class="px-4 py-2 rounded-xl bg-slate-200 hover:bg-slate-300 transition"
        >
          상태 초기화
        </button>

        <button
          id="saveBtn"
          class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-500 text-white transition"
        >
          로컬 저장
        </button>

      </div>

    </div>

    <!-- SUMMARY -->
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-4 mb-6">

      <div class="card rounded-2xl p-5 lg:col-span-2">

        <div class="flex justify-between items-center mb-4">

          <h2 class="text-lg font-semibold text-slate-700">
            전체 파이프라인 진행률
          </h2>

          <span
            id="overallPercent"
            class="text-3xl font-bold text-blue-600"
          >
            0%
          </span>

        </div>

        <div class="w-full h-4 bg-slate-200 rounded-full overflow-hidden">

          <div
            id="progressBar"
            class="h-full bg-gradient-to-r from-cyan-500 to-blue-500 transition-all duration-500"
            style="width:0%"
          ></div>

        </div>

        <p class="text-sm text-slate-500 mt-3">
          총 20개 오브젝트 기준
        </p>

      </div>

      <div class="card rounded-2xl p-5">

        <div class="text-slate-500 text-sm mb-2">
          SfM 완료
        </div>

        <div
          id="sfmCount"
          class="text-3xl font-bold text-green-600"
        >
          0/20
        </div>

      </div>

      <div class="card rounded-2xl p-5">

        <div class="text-slate-500 text-sm mb-2">
          3D-HGS 완료
        </div>

        <div
          id="hgsCount"
          class="text-3xl font-bold text-orange-500"
        >
          0/20
        </div>

      </div>

      <div class="card rounded-2xl p-5">

        <div class="text-slate-500 text-sm mb-2">
          AA-2DGS 완료
        </div>

        <div
          id="aaCount"
          class="text-3xl font-bold text-cyan-600"
        >
          0/20
        </div>

      </div>

    </div>

    <!-- FILTER -->
    <div class="card rounded-2xl p-5 mb-6">

      <div class="flex flex-col lg:flex-row gap-4">

        <div class="flex-1">

          <label class="block text-sm text-slate-500 mb-2">
            오브젝트 검색
          </label>

          <input
            id="searchInput"
            type="text"
            placeholder="예: 동경"
            class="w-full rounded-xl px-4 py-3"
          />

        </div>

        <div class="w-full lg:w-80">

          <label class="block text-sm text-slate-500 mb-2">
            다음 작업 필터
          </label>

          <select
            id="filterSelect"
            class="w-full rounded-xl px-4 py-3"
          >
            <option value="ALL">전체</option>
            <option value="SfM 실행 필요">SfM 실행 필요</option>
            <option value="3D-HGS 실행 필요">3D-HGS 실행 필요</option>
            <option value="AA-2DGS 실행 필요">AA-2DGS 실행 필요</option>
            <option value="전체 완료">전체 완료</option>
          </select>

        </div>

      </div>

    </div>

    <!-- TABLE -->
    <div class="card rounded-2xl overflow-hidden">

      <div class="overflow-x-auto">

        <table class="w-full min-w-[1300px]">

          <thead class="bg-slate-100 border-b border-slate-200">

            <tr class="text-left text-slate-700">

              <th class="px-6 py-4 font-semibold">
                오브젝트명
              </th>

              <th class="px-6 py-4 font-semibold">
                SfM (COLMAP)
              </th>

              <th class="px-6 py-4 font-semibold">
                3D-HGS
              </th>

              <th class="px-6 py-4 font-semibold">
                AA-2DGS
              </th>

              <th class="px-6 py-4 font-semibold">
                다음 작업
              </th>

              <th class="px-6 py-4 font-semibold">
                비고
              </th>

            </tr>

          </thead>

          <tbody
            id="tableBody"
            class="divide-y divide-slate-200 bg-white"
          ></tbody>

        </table>

      </div>

    </div>

  </div>

  <script>

    const STATUS = {
      WAITING: "대기",
      PROGRESS: "진행중",
      DONE: "완료"
    };

    const STORAGE_KEY = "reconstruction-dashboard-v2";

    let data = [];

    function createInitialData() {

      const objectNames = [

        "02. 동경",
        "04. 백자 청재 물고기 연적",
        "08. 어피안경집",
        "09. 안경집 제작 틀",
        "10_윤도(나침반) (new)",
        "11_고드레 (new)",
        "16_양이호 (new)",
        "17_푼주 (new)",
        "19_고려유기토병 (new)",
        "21. 청화백 자주병",
        "22_백자제기 (new) -1",
        "24. 떨잠",
        "25_인장 (new) -1",
        "26. 부시쌈지",
        "27. 침통-1",
        "28_마패 (new)",
        "29_금속활자 (new)",
        "30. 금속결쇠 - 갈고리, 자물쇠, 핀, 물고기",
        "38_부적패 (new)",
        "39. 심소나 킨츠기 청자흑유컵"

      ];

      return objectNames.map((name, i) => ({
        id: i + 1,
        name,
        sfm: STATUS.WAITING,
        hgs: STATUS.WAITING,
        aa: STATUS.WAITING,
        note: ""
      }));
    }

    function loadData() {

      const saved =
        localStorage.getItem(STORAGE_KEY);

      if (saved) {
        data = JSON.parse(saved);
      } else {
        data = createInitialData();
      }
    }

    function saveData() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
      );
    }

    function getNextTask(item) {

      if (item.sfm !== STATUS.DONE) {
        return "SfM 실행 필요";
      }

      if (item.hgs !== STATUS.DONE) {
        return "3D-HGS 실행 필요";
      }

      if (item.aa !== STATUS.DONE) {
        return "AA-2DGS 실행 필요";
      }

      return "전체 완료";
    }

    function getStatusClass(status) {

      switch(status) {

        case STATUS.WAITING:
          return "status-waiting";

        case STATUS.PROGRESS:
          return "status-progress";

        case STATUS.DONE:
          return "status-done";
      }
    }

    function getNextClass(task) {

      switch(task) {

        case "SfM 실행 필요":
          return "next-sfm";

        case "3D-HGS 실행 필요":
          return "next-hgs";

        case "AA-2DGS 실행 필요":
          return "next-aa";

        case "전체 완료":
          return "next-done";
      }
    }

    function createStatusSelect(id, field, current) {

      return `
        <select
          data-id="${id}"
          data-field="${field}"
          class="
            status-select
            rounded-xl
            px-3
            py-2
            font-medium
            ${getStatusClass(current)}
          "
        >

          <option
            ${current === STATUS.WAITING ? "selected" : ""}
          >
            대기
          </option>

          <option
            ${current === STATUS.PROGRESS ? "selected" : ""}
          >
            진행중
          </option>

          <option
            ${current === STATUS.DONE ? "selected" : ""}
          >
            완료
          </option>

        </select>
      `;
    }

    function renderTable() {

      const tbody =
        document.getElementById("tableBody");

      const search =
        document
          .getElementById("searchInput")
          .value
          .toLowerCase();

      const filter =
        document
          .getElementById("filterSelect")
          .value;

      const filtered = data.filter(item => {

        const next = getNextTask(item);

        const matchSearch =
          item.name.toLowerCase().includes(search);

        const matchFilter =
          filter === "ALL" || next === filter;

        return matchSearch && matchFilter;
      });

      tbody.innerHTML = "";

      filtered.forEach(item => {

        const nextTask = getNextTask(item);

        const tr = document.createElement("tr");

        tr.className =
          "hover:bg-slate-50 transition";

        tr.innerHTML = `

          <td class="px-6 py-4 font-medium text-slate-700">
            ${item.name}
          </td>

          <td class="px-6 py-4">
            ${createStatusSelect(item.id, "sfm", item.sfm)}
          </td>

          <td class="px-6 py-4">
            ${createStatusSelect(item.id, "hgs", item.hgs)}
          </td>

          <td class="px-6 py-4">
            ${createStatusSelect(item.id, "aa", item.aa)}
          </td>

          <td class="px-6 py-4">

            <span class="
              inline-flex
              items-center
              px-3
              py-1
              rounded-full
              text-sm
              font-medium
              ${getNextClass(nextTask)}
            ">

              ${nextTask}

            </span>

          </td>

          <td class="px-6 py-4">

            <input
              type="text"
              value="${item.note}"
              data-id="${item.id}"
              class="note-input w-full rounded-lg px-3 py-2"
              placeholder="메모 입력..."
            />

          </td>
        `;

        tbody.appendChild(tr);
      });

      attachEvents();
      updateSummary();
    }

    function attachEvents() {

      document
        .querySelectorAll(".status-select")
        .forEach(select => {

          select.addEventListener("change", (e) => {

            const id =
              Number(e.target.dataset.id);

            const field =
              e.target.dataset.field;

            const item =
              data.find(v => v.id === id);

            item[field] = e.target.value;

            saveData();
            renderTable();
          });

        });

      document
        .querySelectorAll(".note-input")
        .forEach(input => {

          input.addEventListener("input", (e) => {

            const id =
              Number(e.target.dataset.id);

            const item =
              data.find(v => v.id === id);

            item.note = e.target.value;

            saveData();
          });

        });
    }

    function updateSummary() {

      const sfmDone =
        data.filter(v =>
          v.sfm === STATUS.DONE
        ).length;

      const hgsDone =
        data.filter(v =>
          v.hgs === STATUS.DONE
        ).length;

      const aaDone =
        data.filter(v =>
          v.aa === STATUS.DONE
        ).length;

      document.getElementById("sfmCount")
        .textContent = `${sfmDone}/20`;

      document.getElementById("hgsCount")
        .textContent = `${hgsDone}/20`;

      document.getElementById("aaCount")
        .textContent = `${aaDone}/20`;

      const totalSteps = data.length * 3;

      let completedSteps = 0;

      data.forEach(item => {

        if (item.sfm === STATUS.DONE)
          completedSteps++;

        if (item.hgs === STATUS.DONE)
          completedSteps++;

        if (item.aa === STATUS.DONE)
          completedSteps++;

      });

      const percent =
        Math.round(
          (completedSteps / totalSteps) * 100
        );

      document.getElementById("overallPercent")
        .textContent = `${percent}%`;

      document.getElementById("progressBar")
        .style.width = `${percent}%`;
    }

    document
      .getElementById("searchInput")
      .addEventListener("input", renderTable);

    document
      .getElementById("filterSelect")
      .addEventListener("change", renderTable);

    document
      .getElementById("saveBtn")
      .addEventListener("click", () => {

        saveData();

        const btn =
          document.getElementById("saveBtn");

        btn.textContent = "저장 완료";

        setTimeout(() => {
          btn.textContent = "로컬 저장";
        }, 1200);

      });

    document
      .getElementById("resetBtn")
      .addEventListener("click", () => {

        if (!confirm("모든 상태를 초기화할까요?")) {
          return;
        }

        localStorage.removeItem(STORAGE_KEY);

        data = createInitialData();

        renderTable();

      });

    loadData();
    renderTable();

  </script>

</body>
</html>
